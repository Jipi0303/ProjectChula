<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Permite scroll natural en pantallas pequeñas */
            background-color: #f5f5f5;
            box-sizing: border-box;
        }
        
        .container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .left-section {
            padding: 20px;
            border-right: 1px solid #ddd;
            flex: 2;
        }
        
        .right-section {
            padding: 20px;
            background-color: #f9f9f9;
            flex: 1;
        }
        
        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .message {
            font-size: 16px;
            margin-bottom: 20px;
            color: #555;
        }
        
        .timers {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 5px;
        }
        
        .timer {
            font-size: 16px;
            font-weight: bold;
            background: #eee;
            padding: 8px 12px;
            border-radius: 5px;
            text-align: center;
            flex: 1;
        }
        
        .grid {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none; /* Evita desplazamientos indeseados al deslizar el dedo */
            
            display: grid;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px auto;
            gap: 2px;
        }
        
        .cell {
            aspect-ratio: 1 / 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: clamp(12px, 3.5vw, 20px);
            background: #f0f0f0;
            border: 1px solid #ccc;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            border-radius: 4px;
        }
        
        .cell.selected {
            background-color: #cce7ff !important;
        }
        
        .cell.highlight {
            background-color: #98fb98;
        }
        
        .end-buttons {
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        
        .button {
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .button:hover {
            background-color: #0056b3;
        }
        
        .words-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); /* Lista adaptable */
            gap: 5px;
        }
        
        .words-list li {
            padding: 5px;
            font-size: 15px;
        }
        
        .words-list li.found {
            text-decoration: line-through;
            color: #888;
        }

        /* Dispositivos Móviles */
        @media (max-width: 768px) {
            body {
                padding: 5px;
            }
            .container {
                flex-direction: column;
                border-radius: 8px;
            }
            .left-section {
                border-right: none;
                border-bottom: 1px solid #ddd;
                padding: 15px;
            }
            .right-section {
                padding: 15px;
            }
            .timer {
                font-size: 14px;
                padding: 6px;
            }
            .title {
                font-size: 20px;
            }
            .message {
                font-size: 14px;
            }
            .words-list {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
            .words-list li {
                font-size: 13px;
            }
        }

        /* Pantallas muy pequeñas (~5 pulgadas, ~360px) */
        @media (max-width: 400px) {
            body {
                padding: 3px;
            }
            .left-section, .right-section {
                padding: 10px;
            }
            .title {
                font-size: 18px;
            }
            .timers {
                gap: 3px;
            }
            .timer {
                font-size: 12px;
                padding: 5px 4px;
            }
            .grid {
                gap: 1px;
            }
            .words-list {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 4px;
            }
            .words-list li {
                font-size: 12px;
                padding: 4px;
            }
            .button {
                padding: 8px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-section">
            <div class="title">Sopa de Letras</div>
            <p class="message" id="message">Encuentra todas las palabras antes de que se acabe el tiempo. ¡Buena suerte!</p>
            <div class="timers">
                <div class="timer" id="timer1">4:00 ⭐⭐⭐</div>
                <div class="timer" id="timer2">4:30 ⭐⭐</div>
                <div class="timer" id="timer3">7:00 ⭐</div>
            </div>
            <div class="grid" id="grid"></div>
            <div class="end-buttons" id="end-buttons">
                <button class="button" id="restart-button">Reiniciar</button>
                <button class="button" id="next-button">Siguiente Juego</button>
            </div>
        </div>
        <div class="right-section">
            <h3 style="text-align: center; margin-bottom: 10px;">Palabras a encontrar</h3>
            <ul class="words-list" id="words-list"></ul>
        </div>
    </div>
    <script src="sopa2.js"></script>
</body>
</html>
